# Alembic 配置文件。
#
# 注意:`sqlalchemy.url` 不在本文件配置 —— 由 `alembic/env.py` 从
# `app.core.config.Settings.database_url` 注入,避免把连接串(含密码)硬编码进
# 仓库。要切环境时改 `.env` / 注入环境变量即可,**不要**改本文件。

[alembic]
script_location = alembic
prepend_sys_path = .
# alembic 1.14 起新增:prepend_sys_path 的分隔符(避免警告升级为错误)
path_separator = os
version_path_separator = os
sqlalchemy.url =

# 日志(Alembic 自己的进度;应用日志走 structlog,与此独立)
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
